<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11a07d"/>
      <stop offset="1" stop-color="#0a6b52"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4f2"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#062f24" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- receipt paper with zigzag bottom -->
  <g filter="url(#sh)">
    <path fill="url(#paper)" d="
      M176 118 H336 A20 20 0 0 1 356 138 V372
      l-20 14 -20 -14 -20 14 -20 -14 -20 14 -20 -14 -20 14 -20 -14 -20 14 -20 -14
      V138 A20 20 0 0 1 176 118 Z"/>
  </g>

  <!-- header block -->
  <rect x="188" y="150" width="136" height="20" rx="8" fill="#0e8a6b"/>
  <!-- text lines -->
  <rect x="188" y="192" width="136" height="12" rx="6" fill="#c7d3d0"/>
  <rect x="188" y="216" width="98"  height="12" rx="6" fill="#c7d3d0"/>
  <rect x="188" y="240" width="136" height="12" rx="6" fill="#c7d3d0"/>
  <rect x="188" y="264" width="76"  height="12" rx="6" fill="#c7d3d0"/>
  <!-- total row accent -->
  <rect x="188" y="296" width="136" height="16" rx="8" fill="#173039"/>

  <!-- verified badge -->
  <circle cx="336" cy="330" r="52" fill="#173039"/>
  <circle cx="336" cy="330" r="52" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="3"/>
  <path d="M312 331 l16 16 l30 -34" fill="none" stroke="#3ee0a6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
